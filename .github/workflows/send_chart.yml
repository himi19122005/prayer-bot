name: Send Daily Chart

on:
  workflow_dispatch:  # so you can test manually
  schedule:
    - cron: '30 17 * * *'  # 11:30 PM Dhaka (gives time for Isha reply to be collected)

jobs:
  send-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send chart
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python chart.py